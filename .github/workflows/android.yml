name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'app.js'
      - 'styles.css'
      - 'sw.js'
      - 'manifest.webmanifest'
      - 'icons/**'
      - 'capacitor.config.json'
      - 'package.json'
      - '.github/workflows/android.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Capacitor
        run: npm install

      - name: Siapkan web assets (www/)
        run: |
          mkdir -p www
          cp index.html app.js styles.css sw.js manifest.webmanifest www/
          cp -r icons www/

      - name: Scaffold & sync Android
        run: |
          npx cap add android
          npx cap sync android

      - name: Build APK (debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk AC-Service.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AC-Service-APK
          path: AC-Service.apk

      - name: Publish ke Releases (tag latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: AC Service APK (terbaru)
          files: AC-Service.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
